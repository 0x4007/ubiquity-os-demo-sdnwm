plugins:
  - uses:
      - plugin: "https://os-command-start-stop.ubq.fi"
        skipBotEvents: false
  - uses:
      - plugin: "https://os-command-demo.ubq.fi"
  - uses:
      - plugin: "https://os-command-wallet.ubq.fi"
  - uses:
      - plugin: "ubiquity-os-marketplace/command-ask@v1.2.0"
        with:
          model: "deepseek/deepseek-r1-0528:free"
          openAiBaseUrl: "https://openrouter.ai/api/v1"
  - uses:
      - plugin: "https://os-command-query.ubq.fi"
  - uses:
      - plugin: "ubiquity-os-marketplace/text-conversation-rewards@v1.7.6"
        skipBotEvents: false
        with:
          incentives:
            collaboratorOnlyPaymentInvocation: false
            contentEvaluator:
              openAi:
                endpoint: "https://openrouter.ai/api/v1"
                model: "deepseek/deepseek-chat-v3-0324:free"
            userExtractor: {}
            dataPurge: {}
            formattingEvaluator: {}
            payment: {}
            githubComment: {}
            reviewIncentivizer: {}
            simplificationIncentivizer: {}
            externalContent:
              llmImageModel:
                model: "meta-llama/llama-4-maverick:free"
              llmWebsiteModel:
                model: "deepseek/deepseek-chat-v3-0324:free"
          evmPrivateEncrypted: "wZxC4nDdGB2lSlD4-gBGrUhZ2Q5xH5AIWRX3qss5BBWejbXYxN7Ld59wLTDtLB9wTtwKiylDKmnZWLISBRi8SncKEayCBDjZ7zVSOSydQDOhTgPgjBj02eWX1soVbQIRwScn_urSPMl_C5B7KQLq4pO9WQAN8tCI_Ktko01Iemu-C_w"
          evmNetworkId: 100
  - uses:
      - plugin: "ubiquity-os-marketplace/daemon-disqualifier@v1.0.1"
  - uses:
      - plugin: "ubiquity-os-marketplace/text-vector-embeddings@v1.1.0"
        with:
          demoFlag: true
